name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pillow pytesseract deep-translator pyperclip pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name "OCR_Translator" --icon=icon.ico ocr_translator.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: OCR_Translator_Windows
          path: dist/OCR_Translator.exe
          retention-days: 30
