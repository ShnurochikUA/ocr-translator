name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Get code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build exe
        run: |
          pyinstaller --onefile --windowed --name "ScreenTranslatorUK" screen_translator_uk.py

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: ScreenTranslatorUK
          path: dist/ScreenTranslatorUK.exe
